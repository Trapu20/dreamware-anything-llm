services:
  app:
    image: ghcr.io/trapu20/dreamware-anything-llm:develop
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    volumes:
      - /data/dreamanything/test/storage:/app/server/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
