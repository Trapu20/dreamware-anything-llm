name: Deploy → Production Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false  # queue, don't cancel in-flight deployments

jobs:
  build:
    name: Build & Push (latest)
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      image_tag: latest
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  deploy:
    name: SSH Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production  # ← triggers manual approval gate

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_PROD_HOST }}
          username: ${{ secrets.HETZNER_SSH_USER }}
          key: ${{ secrets.HETZNER_PROD_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/dreamanything/production

            echo "==> Backing up .env..."
            cp .env ".env.backup.$(date +%Y%m%d%H%M%S)"

            echo "==> Updating compose file..."
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/infra/docker-compose.production.yml" \
              -o docker-compose.yml

            echo "==> Pulling latest images..."
            docker compose pull

            echo "==> Seeding RIS MCP config..."
            python3 -c "
import json, os
config_path = '/data/dreamanything/production/storage/plugins/anythingllm_mcp_servers.json'
os.makedirs(os.path.dirname(config_path), exist_ok=True)
try:
    with open(config_path) as f:
        cfg = json.load(f)
except (FileNotFoundError, json.JSONDecodeError, ValueError):
    cfg = {'mcpServers': {}}
if 'ris' in cfg.get('mcpServers', {}):
    print('    RIS MCP already configured — skipping.')
else:
    cfg.setdefault('mcpServers', {})['ris'] = {
        'url': 'http://ris-mcp:3000/mcp',
        'type': 'streamable',
        'anythingllm': {'autoStart': True}
    }
    with open(config_path, 'w') as f:
        json.dump(cfg, f, indent=2)
    print('    Added RIS MCP server to config.')
"
            chown -R 1000:1000 /data/dreamanything/production/storage/plugins

            echo "==> Starting updated container..."
            docker compose up -d --no-build --remove-orphans

            echo "==> Waiting for health check (up to 120s)..."
            timeout 120 bash -c '
              until docker compose exec -T app curl -sf http://localhost:3001/api/ping > /dev/null 2>&1; do
                echo "  Waiting..."
                sleep 5
              done
            '

            echo "==> Pruning old images..."
            docker image prune -f --filter "until=72h"

            echo "==> Production deploy complete."
            echo ""
            echo "  TIP: Run the 'Sync Settings' workflow to synchronise system_settings from test."
